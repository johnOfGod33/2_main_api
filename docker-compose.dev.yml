services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - MONGODB_URI=${MONGODB_URI}
      - MONGODB_DB=${MONGODB_DB}
      - PYTHONPATH=/code
    depends_on:
      - mongo
    networks:
      - deuxieme_main-network
    volumes:
      # Bind mount évite `docker compose watch` + sync (erreur getent / user « app » sur certains hôtes).
      - ./app:/code/app
    command:
      - uvicorn
      - app.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --reload
      - --reload-dir
      - /code/app

  mongo:
    image: mongo:7.0
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_DATABASE=deuxieme_main
    volumes:
      - mongo_data:/data/db
    networks:
      - deuxieme_main-network

volumes:
  mongo_data:

networks:
  deuxieme_main-network:
    driver: bridge
