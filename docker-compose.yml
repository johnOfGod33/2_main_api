services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - MONGODB_URI=mongodb://mongo:27017/deuxieme_main
    depends_on:
      - mongo
    networks:
      - deuxieme_main-network

  mongo:
    image: mongo:7.0
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_DATABASE=deuxieme_main
    volumes:
      - mongo_data:/data/db
    networks:
      - deuxieme_main-network

volumes:
  mongo_data:

networks:
  deuxieme_main-network:
    driver: bridge
