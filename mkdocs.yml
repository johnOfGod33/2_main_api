site_name: 2ème Main API
site_description: Marketplace API (second-hand) — documentation & architecture

docs_dir: docs
site_dir: public

theme:
  name: material
  palette:
    - scheme: default
      primary: teal
      accent: green
      toggle:
        icon: material/brightness-7
        name: Dark mode
    - scheme: slate
      primary: teal
      accent: green
      toggle:
        icon: material/brightness-4
        name: Light mode
  font:
    text: Outfit
    code: Roboto Mono
  features:
    - navigation.instant
    - navigation.tracking
    - content.code.copy
    - toc.follow

markdown_extensions:
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - tables
  - toc:
      permalink: true

plugins:
  - search
  - mermaid2:
      javascript: https://unpkg.com/mermaid@10/dist/mermaid.min.js

nav:
  - Home: index.md
  - Architecture: architecture.md
  - API & modules: technical.md
  - Development: development.md
  - CI / GitHub Actions: ci.md
